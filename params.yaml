# Parâmetros do modelo NSFD espacial
model_parameters:
  lambda_R: 0.2
  mu_A: 0.05
  mu_RM: 0.01
  alpha_M: 0.1
  v1: 0.5          # velocidade advectiva em x
  v2: 0.5          # velocidade advectiva em y
  lambda_M: 0.3
  rho: 1.0
  mu_MB: 0.02
  alpha_B: 0.1
  lambda_B: 0.15
  k_B: 10.0

mesh:
  Lx: 10
  Ly: 10
  Nx: 100
  Ny: 100

CG:
  tol: 1e-12
  max_iter: 1000

time:
  dt: 0.001
  max_steps: 100

initial_conditions:
  R0_val: 5.0
  M0_val: 1.0
  B0_val: 0.5
  dispM: 0.02     # largura da gaussiana de M
  dispB: 0.03     # largura da gaussiana de B

# Configurações de saída
output:
  R: "R.csv"
  M: "M.csv"
  B: "B.csv"
  error: "error.csv"
  error_trigger: true

mms:
  B_R: 1.0
  B_M: 0.5
  B_B: 0.3
